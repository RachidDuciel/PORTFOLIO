<main class="contact-main">
    <section class="contact-info">
        <h1>Restons en contact</h1>
        <p>Je suis basé à <strong>Lubumbashi</strong>, disponible pour vos projets.</p>
        
        <div class="direct-contact">
            <p><i class="fa-solid fa-phone"></i> +243 98 44 00 260</p>
            <div class="social-contact">
                <a href="https://wa.me/243993886722" target="_blank" title="WhatsApp"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>
                <a href="https://t.me/+243993886722" target="_blank" title="Telegram"><i class="fa-brands fa-telegram"></i> Telegram</a>
            </div>
        </div>
    </section>

    <section class="contact-id">
        <form action="#" method="POST" class="contact-form">
            <div class="contact-input">
                <label for="name">Nom complet</label>
                <input type="text" id="name" name="name" placeholder="Votre nom" required>
            </div>
            
            <div class="contact-input">
                <label for="phone">Téléphone</label>
                <input type="tel" id="phone" name="phone" placeholder="+243..." required>
            </div>

            <div class="contact-input">
                <label for="message">Message (Optionnel)</label>
                <textarea id="message" name="message" rows="4" placeholder="Comment puis-je vous aider ?"></textarea>
            </div>

            <button type="submit" class="contact-btn">Envoyer le message</button>
        </form>
    </section>
